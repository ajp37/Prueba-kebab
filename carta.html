<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carta - Kebab Puerta de Estepa</title>

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://use.fontawesome.com/releases/v5.11.0/css/all.css" rel="stylesheet">

    <style>
        :root {
            --naranja: #ff6600;
            --oscuro: #1a1a1a;
            --fondo: #ffffff;
        }

        body { 
            margin: 0; 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--fondo); 
        }

        /* --- HEADER --- */
        header {
            padding: 15px 0;
            border-bottom: 2px solid var(--naranja);
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1000;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo img { height: 50px; }
        .btn-volver {
            background: var(--oscuro);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }

        /* --- SECCIÓN CARTA --- */
        .carta-container {
            max-width: 1250px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .titulo-seccion {
            text-align: center;
            margin-bottom: 40px;
        }
        .titulo-seccion h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 40px;
            color: var(--oscuro);
            margin: 0;
            text-transform: uppercase;
        }
        .titulo-seccion .raya {
            width: 60px;
            height: 4px;
            background: var(--naranja);
            margin: 10px auto 0;
        }

        /* --- GRID: 6 COLUMNAS EN PC / 2 EN MÓVIL --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6 columnas en grande */
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); }

        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-txt {
            background: var(--naranja);
            color: #fff;
            padding: 12px 5px;
            text-align: center;
        }
        .card-txt span {
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1100px) {
            .menu-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 580px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 columnas en móvil */
                gap: 12px;
            }
            .titulo-seccion h1 { font-size: 28px; }
            .card-txt span { font-size: 13px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo"><img src="./assets/logo.png" alt="Logo"></div>
            <a href="index.html" class="btn-volver">← VOLVER</a>
        </div>
    </header>

    <main class="carta-container">
        <div class="titulo-seccion">

        </div>

        <div class="menu-grid">
            <a href="carta-aperitivos.html" class="card">

            </a>

            <a href="#" class="card">

            </a>

            <a href="#" class="card">

            <a href="#" class="card">

            </a>

            <a href="#" class="card">
                <div class="card-img"><img src="https://kebapestambul.com/imagen/categoria/292981305-15.jpg" alt="Salsas"></div>
                <div class="card-txt"><span>SALSAS</span></div>
            </a>
        </div>
    </main>

</body>
</html>
